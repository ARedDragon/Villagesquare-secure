services:
  - type: web
    name: relay-chat
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATA_DIR
        value: /var/data/relay-data
    disk:
      name: relay-data
      mountPath: /var/data
      sizeGB: 1
